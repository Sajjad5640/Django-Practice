{% extends 'master/base.html' %}


       {% block title_block %}
        Course

        {% endblock title_block %}

    {% block content %}

    <table class="table">
  <thead>
    <tr>
      <th scope="col">Title</th>
      <th scope="col">Code</th>
      <th scope="col">Credit</th>
    </tr>
  </thead>
  <tbody>
    {% for cor in course_data %}
    <tr>
      <td>{{cor.title}}</td>
      <td>{{cor.code}}</td>
      <td>{{cor.credit}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

    {% endblock content %}
