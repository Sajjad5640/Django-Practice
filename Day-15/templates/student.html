{% extends 'master/base.html' %}


       {% block title_block %}
        Stundent

        {% endblock title_block %}

    {% block content %}

    <table class="table">
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Age</th>
      <th scope="col">Roll</th>
    </tr>
  </thead>
  <tbody>
    {% for student in student_data %}
    <tr>
      <td>{{student.name}}</td>
      <td>{{student.age}}</td>
      <td>{{student.roll_number}}</td>

    </tr>
    {% endfor %}
  </tbody>
</table>

    {% endblock content %}
