{% extends 'master/base.html' %}
{% block title_block %}
Teacher
{% endblock title_block %}


{% block content %}
<a class="btn btn-primary" href="{% url 'add_teacher' %}" role="button">ADD TEACHER</a>
    <table class="table">
  <thead>
    <tr>

      <th scope="col">Name</th>
      <th scope="col">Address</th>
      <th scope="col">Email</th>
    </tr>
  </thead>
  <tbody>

    {% for teacher in teacher_data  %}
    <tr>
      <td> {{teacher.name}} </td>
      <td> {{teacher.address}} </td>
      <td> {{teacher.email}} </td>

    </tr>
    {% endfor %}
        


  </tbody>
</table>
{% endblock content %}
