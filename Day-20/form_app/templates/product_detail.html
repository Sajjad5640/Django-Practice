{% extends 'master/base.html' %}

{% block content %}
  <div class="card" style="width: 18rem;">
    {% if product_data.image %}
      <img src="{{ product_data.image.url }}" class="card-img-top" width="100px" alt="" srcset="" />
    {% else %}
      No Preview
    {% endif %}
    <div class="card-body">
      <h5 class="card-title">{{product_data.name}}</h5>
      <p class="card-text">{{product_data.product_type}}</p>
      <p class="card-text">{{product_data.product_price}}</p>
      
    </div>
  </div>
{% endblock %}
